<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/registrasi.css">
    
    <title>Konfirmasi</title>
  </head>
  <body>
    <div class="container">
        
        <div class="row align-items-center justify-content-center vh-100">
            <div class="col-lg-8">


                <div class="shadow">
                    <div class="row bg-light">
                        <div class="col-lg-5">
                            <div class="bg-register h-100"></div>
                        </div>
                        <div class="col-lg-7">
                            <div class="p-5 ps-4 text-dark">
                                <h5 class="mb-1 fw-bold">Konfirmasi Kehadiran Anda!</h5>
                                    <div class="row mb-3">
                                <form action="gabung-group.html" method="get">
                                        <div class="col">
                                            <label for="firstname">Nama</label>
                                            <input type="text" class="form-control" id="firstname" required>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="exampleFormControlInput1" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email" required>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col">
                                            <label for="exampleFormControlInput1" class="form-label">No Telepon</label>
                                            <input type="text" class="form-control" id="phone" required>
                                        </div>
                                       
                                    </div>
                                    <div class="d-grid mb-3">
                                        <button type="submit" class="btn btn-primary py-2" >Register</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

    
  </body>
</html>
